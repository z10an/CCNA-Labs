!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
no ip dhcp use vrf connected
ip dhcp excluded-address 192.168.10.1 192.168.10.10
ip dhcp excluded-address 172.16.0.1 172.16.0.10
ip dhcp excluded-address 10.0.0.1
ip dhcp excluded-address 20.0.0.1
!
ip dhcp pool pool1
   network 192.168.10.0 255.255.255.0
   default-router 192.168.10.10 
!
ip dhcp pool pool2
   network 10.0.0.0 255.255.255.248
!
ip dhcp pool pool3
   network 20.0.0.0 255.255.255.248
!
ip dhcp pool pool4
   network 172.16.0.0 255.255.0.0
   default-router 172.16.0.10 
!
!
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
!
!
!
interface FastEthernet0/0
 ip address 10.0.0.1 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet0/1
 ip address 20.0.0.1 255.255.255.248
 duplex auto
 speed auto
!
ip route 172.16.0.0 255.255.0.0 20.0.0.2
ip route 192.168.10.0 255.255.255.0 10.0.0.2
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
